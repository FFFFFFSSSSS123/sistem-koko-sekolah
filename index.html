<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pendaftaran Kelab Kokurikulum</title>
<style>
body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9; }
.container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
button:hover { background-color: #218838; }
#aiResult { margin-top: 15px; font-weight: bold; color: #0056b3; }
</style>
</head>
<body>
<div class="container">
<h2>Pendaftaran Kelab Pintar</h2>
<p>Masukkan hobi anda, AI akan cadangkan kelab yang sesuai!</p>
<input type="text" id="nama" placeholder="Nama Penuh" required>
<input type="text" id="kelas" placeholder="Kelas (Contoh: 3 Bestari)" required>
<input type="text" id="hobi" placeholder="Hobi (Contoh: Suka baca buku)" required>
<button onclick="prosesBorang()">Daftar & Tanya AI</button>
<p id="aiResult"></p>
</div>
<script>
// MASUKKAN KUNCI RAHSIA ANDA DI SINI
const GEMINI_API_KEY = "AIzaSyCHW7y2ult0viW1aIsOoTfm3PYcOGl2Qvw";
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyRglD7R7mpegBmtmaBp7zosTHWe1oInTl_MK8GjC_8QkDrR6sVDod5BnF4b8Vp8YNAOA/exec";
async function prosesBorang() {
        const nama = document.getElementById('nama').value;
        const kelas = document.getElementById('kelas').value;
        const hobi = document.getElementById('hobi').value;
        const resultText = document.getElementById('aiResult');

        if(!nama || !kelas || !hobi) {
            alert("Sila isi semua maklumat!");
            return;
        }

        resultText.innerText = "AI sedang berfikir...";

        const aiPrompt = "Pelajar ini mempunyai hobi: " + hobi + ". Berikan SATU nama kelab sekolah di Malaysia yang paling sesuai untuknya. Jawab dengan nama kelab sahaja tanpa penerangan panjang.";
        
        try {
            // KOD DIKEMASKINI: Menggunakan model gemini-2.5-flash dan v1
            const aiResponse = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify({
                    contents: [{ 
                        parts: [{ 
                            text: aiPrompt 
                        }] 
                    }]
                })
            });

            // Semak jika respon dari Google tidak OK
            if (!aiResponse.ok) {
                throw new Error(`Ralat API Google: ${aiResponse.status}`);
            }

            const aiData = await aiResponse.json();
            const kelabCadangan = aiData.candidates[0].content.parts[0].text.trim();
            resultText.innerText = "Kelab yang didaftarkan: " + kelabCadangan;

            // 2. Hantar data ke Google Sheets
            await fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    nama: nama,
                    kelas: kelas,
                    hobi: hobi,
                    kelab: kelabCadangan
                })
            });

            alert("Pendaftaran berjaya disimpan dalam Google Sheets!");

        } catch (error) {
            resultText.innerText = "Ralat berlaku: " + error.message;
            console.error(error);
        }
    }
</script>
</body>
</html>
